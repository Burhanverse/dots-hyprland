format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$time\n  \
[󱞪](fg:240) \
"""

# Uses indexed terminal colors, following upstream starship coloring behavior.

[directory]
format = "[](fg:252)[ $path ]($style)[](fg:252) "
style = "bg:252 fg:233 "
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
Documents = "󰈙"
Downloads = " "
Music = " "
Pictures = " "

[fill]
style = "fg:252"
symbol = " "

[git_branch]
format = "[](fg:252)[ $symbol $branch ]($style)[](fg:252) "
style = "bg:252 fg:240"
symbol = ""

[git_status]
disabled = false
style = "bg:252 fg:234"
format = '[](fg:252)([$all_status$ahead_behind]($style))[](fg:252) '
up_to_date = '[ ✓ ](bg:252 fg:240)'
untracked = '[?\($count\)](bg:252 fg:243)'
stashed = '[\$](bg:252 fg:240)'
modified = '[!\($count\)](bg:252 fg:243)'
renamed = '[»\($count\)](bg:252 fg:240)'
deleted = '[✘\($count\)](style)'
staged = '[++\($count\)](bg:252 fg:243)'
ahead = '[⇡\(${count}\)](bg:252 fg:240)'
diverged = '⇕[\[](bg:252 fg:240)[⇡\(${ahead_count}\)](bg:252 fg:240)[⇣\(${behind_count}\)](bg:252 fg:236 )[\]](bg:252 fg:240)'
behind = '[⇣\(${count}\)](bg:252 fg:236 )'

[time]
disabled = false
format = "[](fg:252)[ $time 󰴈 ]($style)[ ](fg:252)"
style = "bg:252 fg:236 "
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[](fg:252)[ 󰧱 $user ]($style)[](fg:252) "
show_always = true
style_root = "bg:252 fg:240"
style_user = "bg:252 fg:240"

[hostname]
disabled = false
format = "[](fg:252)[  $hostname ]($style)[](fg:252) "
style = "bg:252 fg:236 "
ssh_only = false

