format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$time\n  \
[󱞪](fg:243) \
"""

# Color scheme ported from the original upstream starship config (og_starship.toml).

[directory]
format = "[](fg:255)[ $path ]($style)[](fg:255) "
style = "bg:255 fg:240"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
Documents = "󰈙"
Downloads = " "
Music = " "
Pictures = " "

[fill]
style = "fg:245"
symbol = " "

[git_branch]
format = "[](fg:252)[ $symbol $branch ]($style)[](fg:252) "
style = "bg:252 fg:235"
symbol = ""

[git_status]
disabled = false
style = "bg:252 fg:235"
format = '[](fg:252)([$all_status$ahead_behind]($style))[](fg:252) '
up_to_date = '[ ✓ ](bg:252 fg:235)'
untracked = '[?\($count\)](bg:252 fg:243)'
stashed = '[\$](bg:252 fg:235)'
modified = '[!\($count\)](bg:252 fg:243)'
renamed = '[»\($count\)](bg:252 fg:235)'
deleted = '[✘\($count\)](bg:252 fg:240)'
staged = '[++\($count\)](bg:252 fg:243)'
ahead = '[⇡\(${count}\)](bg:252 fg:235)'
diverged = '⇕[\[](bg:252 fg:235)[⇡\(${ahead_count}\)](bg:252 fg:235)[⇣\(${behind_count}\)](bg:252 fg:235)[\]](bg:252 fg:235)'
behind = '[⇣\(${count}\)](bg:252 fg:235)'

[time]
disabled = false
format = "[](fg:252)[ $time 󰴈 ]($style)[](fg:252)"
style = "bold bg:252 fg:235"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[](fg:252)[ 󰧱 $user ]($style)[](fg:252) "
show_always = true
style_root = "bold bg:252 fg:235"
style_user = "bold bg:252 fg:235"

[hostname]
disabled = false
format = "[](fg:252)[  $hostname ]($style)[](fg:252) "
style = "bold bg:252 fg:235"
ssh_only = false

